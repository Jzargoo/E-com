syntax="proto3";

option java_package = "com.jzargo.protobuf";
option java_multiple_files = true;

service MediaService{
  // Server-streaming
  rpc getMediaContent(MediaContentURI) returns (stream MediaFile) {}

  // Client-streaming
  // change avatar is a remote method that replaces current file by the same uri
  rpc changeMediaFile(stream ChangeMediaFile) returns (MediaContentURI) {}
  rpc addMediaFile(stream MediaFile) returns (MediaContentURI) {}
}

message MediaFile{
  ContentType contentType = 1;
  bytes contentChunk = 2;
}

message ChangeMediaFile {
  ContentType contentType = 1;
  bytes contentChunk = 2;
  string  fileUri = 3;
}



enum ContentType {
  JPEG = 0;
  PNG  = 1;
  MP4  = 2;
  WEBP = 3;
  WEBM = 4;
}

message MediaContentURI {
  string mediaURI = 1;
}
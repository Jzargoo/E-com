volumes:
  postgres-data:
    driver: local
  vault-file:
    driver: local

services:
  vault:
    image: hashicorp/vault:latest
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -config=/vault/opt/config/vault.hcl
    ports:
      - "8200:8200"
    volumes:
      - ./vault-config:/vault/opt/config
      - vault-file:/vault/file
  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=10"]
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres-sqls:/docker-entrypoint-initdb.d
      - postgres-data:/var/lib/postgresql

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_PASSWORD}
      KC_DB: postgres
      KC_DB_USERNAME: kc_admin
      KC_DB_PASSWORD: kc_123_admin
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
    ports:
      - "127.0.0.1:8890:8890"
    command: start-dev --verbose
    depends_on:
      - postgres